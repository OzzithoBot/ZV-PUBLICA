<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0>
<title>HVAC Cotizador — ZV PERU SAC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --primary: #1a73e8;
  --primary-dark: #1557b0;
  --primary-light: #e8f0fe;
  --accent: #34a853;
  --danger: #ea4335;
  --warning: #fbbc04;
  --bg: #f5f7fa;
  --card: #ffffff;
  --text: #202124;
  --text-sec: #5f6368;
  --border: #dadce0;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(60,64,67,.12);
  --shadow-lg: 0 4px 16px rgba(60,64,67,.18);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  padding: 20px 24px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
.header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
.header p { font-size: .9rem; opacity: .85; }

/* LAYOUT */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 860px) {
  .container { grid-template-columns: 1fr; padding: 12px; }
}

/* CARDS */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 20px;
}
.card h2 {
  font-size: 1.1rem;
  color: var(--primary);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--primary-light);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* FORMS */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-weight: 600;
  font-size: .85rem;
  color: var(--text-sec);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .3px;
}
.form-group input,
.form-group select {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 1rem;
  transition: border-color .2s, box-shadow .2s;
  background: #fff;
}
.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(26,115,232,.15);
}

/* EQUIPO INFO */
.equipo-info {
  background: var(--primary-light);
  border-radius: 8px;
  padding: 14px;
  margin-top: 10px;
  font-size: .9rem;
  display: none;
}
.equipo-info.visible { display: block; }
.equipo-info .badge {
  display: inline-block;
  background: var(--primary);
  color: #fff;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: .75rem;
  font-weight: 600;
  margin-right: 6px;
  margin-bottom: 4px;
}
.equipo-info .price-tag {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--primary-dark);
  margin-top: 6px;
}

/* CHECKBOXES */
.checklist { display: flex; flex-direction: column; gap: 10px; }
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
  background: #fff;
}
.check-item:hover { border-color: var(--primary); background: var(--primary-light); }
.check-item.checked { border-color: var(--accent); background: #e6f4ea; }
.check-item input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--accent);
  flex-shrink: 0;
  margin-top: 2px;
}
.check-item .check-label { font-size: .9rem; font-weight: 500; }
.check-item .check-detail { font-size: .78rem; color: var(--text-sec); margin-top: 2px; }

/* BUTTONS */
.btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--accent); color: #fff; }
.btn-success:hover { background: #2d9249; }
.btn-warning { background: var(--warning); color: #333; }
.btn-warning:hover { background: #f9a825; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #c5221f; }
.btn-outline {
  background: transparent;
  color: var(--primary);
  border: 2px solid var(--primary);
}
.btn-outline:hover { background: var(--primary-light); }
.btn-sm { padding: 6px 14px; font-size: .8rem; }
.btn-block { width: 100%; justify-content: center; }

/* RESULT PANEL */
.result-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  position: sticky;
  top: 20px;
}
.result-card h2 {
  font-size: 1.1rem;
  color: var(--primary);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--primary-light);
}

/* DESGLOSE */
.desglose { margin-bottom: 16px; }
.desglose-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: .9rem;
}
.desglose-row:last-child { border-bottom: none; }
.desglose-row .label { color: var(--text-sec); }
.desglose-row .value { font-weight: 600; }
.desglose-row.total {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--primary-dark);
  border-top: 3px solid var(--primary);
  border-bottom: none;
  padding-top: 14px;
  margin-top: 8px;
}
.desglose-row.subtotal {
  font-weight: 700;
  color: var(--text);
  border-top: 2px solid var(--border);
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #333;
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: .9rem;
  box-shadow: var(--shadow-lg);
  z-index: 9999;
  opacity: 0;
  transform: translateY(20px);
  transition: all .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.toast.success { background: var(--accent); }
.toast.error { background: var(--danger); }

/* FILE INPUT */
.file-input-wrapper {
  position: relative;
  overflow: hidden;
  display: inline-block;
}
.file-input-wrapper input[type="file"] {
  position: absolute;
  left: 0; top: 0;
  opacity: 0;
  width: 100%; height: 100%;
  cursor: pointer;
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-sec);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

/* PRINT / PDF */
.pdf-area { background: #fff; }

/* RESPONSIVE */
@media (max-width: 860px) {
  .result-card { position: static; }
  .header h1 { font-size: 1.3rem; }
}

/* ANIMATIONS */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn .3s ease; }

/* NUMBER INPUT WITH UNIT */
.input-with-unit { display: flex; align-items: stretch; }
.input-with-unit input { border-radius: 8px 0 0 8px; border-right: none; }
.input-with-unit .unit {
  background: var(--primary-light);
  color: var(--primary-dark);
  font-weight: 600;
  font-size: .85rem;
  padding: 0 14px;
  display: flex;
  align-items: center;
  border: 2px solid var(--border);
  border-left: none;
  border-radius: 0 8px 8px 0;
  white-space: nowrap;
}

/* CONFIG COLLAPSE */
.config-toggle {
  background: none;
  border: none;
  color: var(--primary);
  font-size: .85rem;
  cursor: pointer;
  padding: 4px 0;
  text-decoration: underline;
}
.config-panel {
  display: none;
  margin-top: 12px;
  padding: 14px;
  background: #f8f9fa;
  border-radius: 8px;
  border: 1px solid var(--border);
}
.config-panel.open { display: block; }
.config-panel .form-group { margin-bottom: 10px; }
.config-panel .form-group label { font-size: .78rem; }
.config-panel .form-group input { padding: 6px 10px; font-size: .85rem; }

/* ITEM COUNT */
.item-count {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
}
.item-count button {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  background: #fff;
  border-radius: 6px;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}
.item-count button:hover { border-color: var(--primary); background: var(--primary-light); }
.item-count span { font-weight: 700; font-size: 1.1rem; min-width: 28px; text-align: center; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>❄️ HVAC Cotizador</h1>
  <p>Sistema de cotización de proyectos de aire acondicionado — ZV PERU SAC</p>
</div>

<div class="container">
  <!-- PANEL IZQUIERDO: FORMULARIO -->
  <div>
    <!-- DATOS DEL EQUIPO -->
    <div class="card">
      <h2>📦 Equipo</h2>
      <div class="form-group">
        <label for="selectEquipo">Seleccionar equipo</label>
        <select id="selectEquipo">
          <option value="">-- Seleccione un equipo --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Cantidad</label>
        <div class="item-count">
          <button id="btnMenos" type="button">−</button>
          <span id="cantidadValor">1</span>
          <button id="btnMas" type="button">+</button>
        </div>
      </div>
      <div id="equipoInfo" class="equipo-info">
        <div id="equipoBadges"></div>
        <div id="equipoPrice" class="price-tag"></div>
      </div>
    </div>

    <!-- DISTANCIAS -->
    <div class="card">
      <h2>📏 Distancias</h2>
      <div class="form-group">
        <label for="acometida">Longitud de acometida (tubería de refrigerante)</label>
        <div class="input-with-unit">
          <input type="number" id="acometida" min="0" max="200" step="0.5" value="0" placeholder="0">
          <span class="unit">metros</span>
        </div>
      </div>
      <div class="form-group">
        <label for="distanciaEC">Distancia evaporador ↔ condensador</label>
        <div class="input-with-unit">
          <input type="number" id="distanciaEC" min="0" max="200" step="0.5" value="0" placeholder="0">
          <span class="unit">metros</span>
        </div>
      </div>
    </div>

    <!-- PARÁMETROS EXTRA -->
    <div class="card">
      <h2>⚙️ Parámetros de Instalación</h2>
      <div class="checklist">
        <label class="check-item" id="labelInstCompleja">
          <input type="checkbox" id="instCompleja">
          <div>
            <div class="check-label">Instalación compleja</div>
            <div class="check-detail">Dificultad alta: altura >4m, perforación muros gruesos, etc. (+15%)</div>
          </div>
        </label>
        <label class="check-item" id="labelTuberiaAdicional">
          <input type="checkbox" id="tuberiaAdicional">
          <div>
            <div class="check-label">Tubería adicional</div>
            <div class="check-detail">Cobre extra para recorridos no estándar (+S/ 65/metro)</div>
          </div>
        </label>
        <div class="form-group" style="margin: 8px 0 0 28px; display:none;" id="tuberiaAdicionalMts">
          <label for="tuberiaAdicionalMetros">Metros de tubería adicional</label>
          <div class="input-with-unit">
            <input type="number" id="tuberiaAdicionalMetros" min="0" max="500" step="1" value="0">
            <span class="unit">metros</span>
          </div>
        </div>
        <label class="check-item" id="labelGarantiaExtendida">
          <input type="checkbox" id="garantiaExtendida">
          <div>
            <div class="check-label">Garantía extendida</div>
            <div class="check-detail">Extensión de garantía de fábrica (+S/ 500)</div>
          </div>
        </label>
        <label class="check-item" id="labelManoObraExtra">
          <input type="checkbox" id="manoObraExtra">
          <div>
            <div class="check-label">Mano de obra extra</div>
            <div class="check-detail">Horas adicionales de trabajo especializado (+S/ 80/hora)</div>
          </div>
        </label>
        <div class="form-group" style="margin: 8px 0 0 28px; display:none;" id="manoObraExtraHoras">
          <label for="manoObraExtraCant">Horas de mano de obra extra</label>
          <div class="input-with-unit">
            <input type="number" id="manoObraExtraCant" min="0" max="100" step="1" value="0">
            <span class="unit">horas</span>
          </div>
        </div>
        <label class="check-item" id="labelIncluirIVA">
          <input type="checkbox" id="incluirIVA">
          <div>
            <div class="check-label">Incluir IGV (18%)</div>
            <div class="check-detail">Aplica el Impuesto General a las Ventas</div>
          </div>
        </label>
      </div>
    </div>

    <!-- CONFIGURACIÓN DE PRECIOS -->
    <div class="card">
      <h2>🔧 Configuración</h2>
      <button class="config-toggle" id="toggleConfig">Mostrar configuración de precios ▾</button>
      <div class="config-panel" id="configPanel">
        <div class="form-group">
          <label for="cfgAcometida">Costo acometida por metro (S/)</label>
          <input type="number" id="cfgAcometida" min="0" step="1" value="150">
        </div>
        <div class="form-group">
          <label for="cfgDistEC">Costo distancia evap-cond por metro (S/)</label>
          <input type="number" id="cfgDistEC" min="0" step="1" value="80">
        </div>
        <div class="form-group">
          <label for="cfgPorcCompleja">Porcentaje instalación compleja (%)</label>
          <input type="number" id="cfgPorcCompleja" min="0" max="100" step="1" value="15">
        </div>
        <div class="form-group">
          <label for="cfgTuberiaAdic">Costo tubería adicional por metro (S/)</label>
          <input type="number" id="cfgTuberiaAdic" min="0" step="1" value="65">
        </div>
        <div class="form-group">
          <label for="cfgGarantia">Costo garantía extendida (S/)</label>
          <input type="number" id="cfgGarantia" min="0" step="1" value="500">
        </div>
        <div class="form-group">
          <label for="cfgManoObra">Costo mano de obra extra por hora (S/)</label>
          <input type="number" id="cfgManoObra" min="0" step="1" value="80">
        </div>
        <div class="form-group">
          <label for="cfgIVA">Porcentaje IGV (%)</label>
          <input type="number" id="cfgIVA" min="0" max="30" step="0.5" value="18">
        </div>
      </div>
    </div>

    <!-- BOTONES DE ACCIÓN -->
    <div class="card">
      <h2>📄 Acciones</h2>
      <div class="btn-row">
        <button class="btn btn-primary btn-block" id="btnCalcular">🔄 Calcular / Actualizar</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-success" id="btnPDF">📕 Exportar PDF</button>
        <button class="btn btn-warning" id="btnCSV">📊 Exportar CSV</button>
      </div>
      <div class="btn-row">
        <div class="file-input-wrapper">
          <button class="btn btn-outline">📂 Cargar cotización (CSV)</button>
          <input type="file" id="fileCSV" accept=".csv">
        </div>
        <button class="btn btn-danger btn-sm" id="btnLimpiar">🗑️ Limpiar</button>
      </div>
    </div>
  </div>

  <!-- PANEL DERECHO: RESULTADO -->
  <div>
    <div class="result-card" id="resultPanel">
      <h2>💰 Cotización</h2>
      <div id="resultadoContenido">
        <div class="empty-state">
          <div class="icon">📋</div>
          <p>Seleccione un equipo y configure los parámetros para generar la cotización.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- PDF AREA (oculta, solo para generación de PDF) -->
<div id="pdfArea" class="pdf-area" style="position:absolute;left:-9999px;top:0;width:800px;padding:30px;background:#fff;">
  <div id="pdfContent"></div>
</div>

<script>
// ============================================================
// ESTADO GLOBAL
// ============================================================
let DB = { equipos: [], configuracion: {} };
let state = {
  equipoId: '',
  cantidad: 1,
  acometida: 0,
  distanciaEC: 0,
  instCompleja: false,
  tuberiaAdicional: false,
  tuberiaAdicionalMetros: 0,
  garantiaExtendida: false,
  manoObraExtra: false,
  manoObraExtraCant: 0,
  incluirIVA: false,
  cfgAcometida: 150,
  cfgDistEC: 80,
  cfgPorcCompleja: 15,
  cfgTuberiaAdic: 65,
  cfgGarantia: 500,
  cfgManoObra: 80,
  cfgIVA: 18
};

// ============================================================
// INICIALIZACIÓN
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  await cargarDB();
  cargarDesdeLocalStorage();
  bindEvents();
  calcular();
});

async function cargarDB() {
  try {
    const resp = await fetch('equipos.json');
    DB = await resp.json();
    llenarSelect();
    // Aplicar config del JSON
    if (DB.configuracion) {
      state.cfgAcometida = DB.configuracion.costo_acometida_por_metro || 150;
      state.cfgDistEC = DB.configuracion.costo_distancia_evap_cond_por_metro || 80;
      state.cfgIVA = DB.configuracion.iva_porcentaje || 18;
      state.cfgManoObra = DB.configuracion.mano_obra_extra_por_hora || 80;
      state.cfgTuberiaAdic = DB.configuracion.costo_tuberia_adicional_por_metro || 65;
      document.getElementById('cfgAcometida').value = state.cfgAcometida;
      document.getElementById('cfgDistEC').value = state.cfgDistEC;
      document.getElementById('cfgIVA').value = state.cfgIVA;
      document.getElementById('cfgManoObra').value = state.cfgManoObra;
      document.getElementById('cfgTuberiaAdic').value = state.cfgTuberiaAdic;
    }
  } catch (e) {
    console.error('Error cargando equipos.json:', e);
    showToast('Error cargando base de datos de equipos', 'error');
  }
}

function llenarSelect() {
  const sel = document.getElementById('selectEquipo');
  sel.innerHTML = '<option value="">-- Seleccione un equipo --</option>';
  // Agrupar por tipo
  const tipos = {};
  DB.equipos.forEach(eq => {
    if (!tipos[eq.tipo]) tipos[eq.tipo] = [];
    tipos[eq.tipo].push(eq);
  });
  for (const [tipo, equipos] of Object.entries(tipos)) {
    const optgroup = document.createElement('optgroup');
    optgroup.label = tipo;
    equipos.forEach(eq => {
      const opt = document.createElement('option');
      opt.value = eq.id;
      opt.textContent = `${eq.marca} ${eq.modelo} — ${eq.btu_texto} — S/ ${eq.precio_unitario.toFixed(2)}`;
      optgroup.appendChild(opt);
    });
    sel.appendChild(optgroup);
  }
}

// ============================================================
// EVENTOS
// ============================================================
function bindEvents() {
  // Equipo
  document.getElementById('selectEquipo').addEventListener('change', e => {
    state.equipoId = e.target.value;
    mostrarInfoEquipo();
    guardarLocalStorage();
    calcular();
  });

  // Cantidad
  document.getElementById('btnMenos').addEventListener('click', () => {
    if (state.cantidad > 1) { state.cantidad--; actualizarCantidad(); }
  });
  document.getElementById('btnMas').addEventListener('click', () => {
    if (state.cantidad < 99) { state.cantidad++; actualizarCantidad(); }
  });

  // Distancias
  document.getElementById('acometida').addEventListener('input', e => {
    state.acometida = parseFloat(e.target.value) || 0;
    guardarLocalStorage(); calcular();
  });
  document.getElementById('distanciaEC').addEventListener('input', e => {
    state.distanciaEC = parseFloat(e.target.value) || 0;
    guardarLocalStorage(); calcular();
  });

  // Checkboxes
  document.getElementById('instCompleja').addEventListener('change', e => {
    state.instCompleja = e.target.checked;
    toggleCheckStyle('labelInstCompleja');
    guardarLocalStorage(); calcular();
  });
  document.getElementById('tuberiaAdicional').addEventListener('change', e => {
    state.tuberiaAdicional = e.target.checked;
    toggleCheckStyle('labelTuberiaAdicional');
    document.getElementById('tuberiaAdicionalMts').style.display = e.target.checked ? 'block' : 'none';
    guardarLocalStorage(); calcular();
  });
  document.getElementById('tuberiaAdicionalMetros').addEventListener('input', e => {
    state.tuberiaAdicionalMetros = parseFloat(e.target.value) || 0;
    guardarLocalStorage(); calcular();
  });
  document.getElementById('garantiaExtendida').addEventListener('change', e => {
    state.garantiaExtendida = e.target.checked;
    toggleCheckStyle('labelGarantiaExtendida');
    guardarLocalStorage(); calcular();
  });
  document.getElementById('manoObraExtra').addEventListener('change', e => {
    state.manoObraExtra = e.target.checked;
    toggleCheckStyle('labelManoObraExtra');
    document.getElementById('manoObraExtraHoras').style.display = e.target.checked ? 'block' : 'none';
    guardarLocalStorage(); calcular();
  });
  document.getElementById('manoObraExtraCant').addEventListener('input', e => {
    state.manoObraExtraCant = parseFloat(e.target.value) || 0;
    guardarLocalStorage(); calcular();
  });
  document.getElementById('incluirIVA').addEventListener('change', e => {
    state.incluirIVA = e.target.checked;

  document.getElementById('toggleConfig').addEventListener('click', () => {
    const panel = document.getElementById('configPanel');

    panel.classList.toggle('open');
    btn.textContent = panel.classList.contains('open') ? 'Ocultar configuración de precios ▴' : 'Mostrar configuración de precios ▾';
  });
  ['cfgAcometida','cfgDistEC','cfgPorcCompleja','cfgTuberiaAdic','cfgGarantia','cfgManoObra','cfgIVA'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      state[id] = parseFloat(e.target.value) || 0;

  document.getElementById('btnCalcular').addEventListener('click', () => { calcular(); showToast('Cotización actualizada', 'success'); });

// ============================================================
// CÁLCULO PRINCIPAL
// ============================================================
function calcular() {
  const resultado = document.getElementById('resultadoContenido');
  if (!state.equipoId) {
    resultado.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>Seleccione un equipo y configure los parámetros para generar la cotización.</p></div>`;
    return;
  }

  const eq = DB.equipos.find(e => e.id === state.equipoId);
  if (!eq) return;

  const sim = DB.configuracion.simbolo_moneda || 'S/';
  const cant = state.cantidad;

  // Cálculos
  const subtotalEquipo = eq.precio_unitario * cant;
  const subtotalInstalacion = eq.costo_instalacion_base * cant;
  const precioBase = subtotalEquipo + subtotalInstalacion;

  const costoAcometida = state.acometida * state.cfgAcometida * cant;
  const costoDistEC = state.distanciaEC * state.cfgDistEC * cant;

  let costoInstCompleja = 0;
  if (state.instCompleja) {
    costoInstCompleja = precioBase * (state.cfgPorcCompleja / 100);
  }

  let costoTuberiaAdic = 0;
  if (state.tuberiaAdicional) {
    costoTuberiaAdic = state.tuberiaAdicionalMetros * state.cfgTuberiaAdic * cant;
  }

  let costoGarantia = 0;
  if (state.garantiaExtendida) {
    costoGarantia = state.cfgGarantia * cant;
  }

  let costoManoObra = 0;
  if (state.manoObraExtra) {
    costoManoObra = state.manoObraExtraCant * state.cfgManoObra;
  }

  const subtotalGeneral = precioBase + costoAcometida + costoDistEC + costoInstCompleja + costoTuberiaAdic + costoGarantia + costoManoObra;

  let iva = 0;
  if (state.incluirIVA) {
    iva = subtotalGeneral * (state.cfgIVA / 100);
  }

  const total = subtotalGeneral + iva;

  // Render desglose
  let html = `<div class="desglose fade-in">`;

  // Equipo
  html += `<div class="desglose-row"><span class="label">Equipo: ${eq.marca} ${eq.modelo} × ${cant}</span><span class="value">${sim} ${subtotalEquipo.toFixed(2)}</span></div>`;
  html += `<div class="desglose-row"><span class="label" style="padding-left:16px;color:#888;font-size:.82rem;">Instalación base incluida</span><span class="value" style="color:#888;font-size:.82rem;">${sim} ${subtotalInstalacion.toFixed(2)}</span></div>`;

  html += `<div class="desglose-row subtotal"><span class="label">Subtotal base</span><span class="value">${sim} ${precioBase.toFixed(2)}</span></div>`;

  // Acometida
  if (state.acometida > 0) {
    html += `<div class="desglose-row"><span class="label">Acometida: ${state.acometida}m × ${sim}${state.cfgAcometida}/m × ${cant} eq.</span><span class="value">${sim} ${costoAcometida.toFixed(2)}</span></div>`;
  }

  // Distancia EC
  if (state.distanciaEC > 0) {
    html += `<div class="desglose-row"><span class="label">Dist. evap-cond: ${state.distanciaEC}m × ${sim}${state.cfgDistEC}/m × ${cant} eq.</span><span class="value">${sim} ${costoDistEC.toFixed(2)}</span></div>`;
  }

  // Instalación compleja
  if (state.instCompleja) {
    html += `<div class="desglose-row"><span class="label">Instalación compleja (+${state.cfgPorcCompleja}%)</span><span class="value">${sim} ${costoInstCompleja.toFixed(2)}</span></div>`;
  }

  // Tubería adicional
  if (state.tuberiaAdicional && state.tuberiaAdicionalMetros > 0) {
    html += `<div class="desglose-row"><span class="label">Tubería adicional: ${state.tuberiaAdicionalMetros}m × ${sim}${state.cfgTuberiaAdic}/m × ${cant} eq.</span><span class="value">${sim} ${costoTuberiaAdic.toFixed(2)}</span></div>`;
  }

  // Garantía
  if (state.garantiaExtendida) {
    html += `<div class="desglose-row"><span class="label">Garantía extendida × ${cant}</span><span class="value">${sim} ${costoGarantia.toFixed(2)}</span></div>`;
  }

  // Mano de obra
  if (state.manoObraExtra && state.manoObraExtraCant > 0) {
    html += `<div class="desglose-row"><span class="label">Mano de obra extra: ${state.manoObraExtraCant}h × ${sim}${state.cfgManoObra}/h</span><span class="value">${sim} ${costoManoObra.toFixed(2)}</span></div>`;
  }

  // Subtotal general
  html += `<div class="desglose-row subtotal"><span class="label">Subtotal general</span><span class="value">${sim} ${subtotalGeneral.toFixed(2)}</span></div>`;

  // IVA
  if (state.incluirIVA) {
    html += `<div class="desglose-row"><span class="label">IGV (${state.cfgIVA}%)</span><span class="value">${sim} ${iva.toFixed(2)}</span></div>`;
  }

  // TOTAL
  html += `<div class="desglose-row total"><span class="label">TOTAL</span><span class="value">${sim} ${total.toFixed(2)}</span></div>`;
  html += `</div>`;

  // Datos del equipo
  html += `<div style="margin-top:16px;padding:14px;background:#f8f9fa;border-radius:8px;font-size:.85rem;">`;
  html += `<strong>Equipo seleccionado:</strong><br>`;
  html += `${eq.marca} ${eq.modelo} — ${eq.btu_texto}<br>`;
  html += `Eficiencia: ${eq.eficiencia} | Refrigerante: ${eq.refrigerante} | ${eq.voltaje}<br>`;
  html += `Cantidad: ${cant}`;
  html += `</div>`;

  resultado.innerHTML = html;
}

function guardarLocalStorage() {
  try { localStorage.setItem('hvac_cotizador_state', JSON.stringify(state)); } catch(e) {}
}

function cargarDesdeLocalStorage() {
  try {
    const saved = localStorage.getItem('hvac_cotizador_state');
    if (!saved) return;
    const parsed = JSON.parse(saved);
    Object.assign(state, parsed);
  } catch(e) { return; }

  // Restaurar valores en DOM
  document.getElementById('selectEquipo').value = state.equipoId || '';
  document.getElementById('cantidadValor').textContent = state.cantidad || 1;
  document.getElementById('acometida').value = state.acometida || 0;

  document.getElementById('cfgPorcCompleja').value = state.cfgPorcCompleja;

  const eq = DB.equipos.find(e => e.id === state.equipoId);
  const sim = DB.configuracion.simbolo_moneda || 'S/';
  const fecha = new Date().toISOString().slice(0,10);

  const rows = [
    ['Campo', 'Valor'],
    ['Fecha', fecha],
    ['Empresa', DB.configuracion.empresa?.nombre || 'ZV PERU SAC'],
    ['Equipo', `${eq.marca} ${eq.modelo}`],
    ['Tipo', eq.tipo],
    ['BTU', eq.btu_texto],
    ['Eficiencia', eq.eficiencia],
    ['Refrigerante', eq.refrigerante],
    ['Voltaje', eq.voltaje],
    ['Cantidad', state.cantidad],
    ['Precio unitario', `${sim} ${eq.precio_unitario.toFixed(2)}`],
    ['Subtotal equipo', `${sim} ${(eq.precio_unitario * state.cantidad).toFixed(2)}`],
    ['Costo instalación base', `${sim} ${(eq.costo_instalacion_base * state.cantidad).toFixed(2)}`],
    ['Longitud acometida (m)', state.acometida],
    ['Costo acometida/metro', `${sim} ${state.cfgAcometida}`],
    ['Total acometida', `${sim} ${(state.acometida * state.cfgAcometida * state.cantidad).toFixed(2)}`],
    ['Distancia evap-cond (m)', state.distanciaEC],
    ['Costo dist. evap-cond/metro', `${sim} ${state.cfgDistEC}`],
    ['Total dist. evap-cond', `${sim} ${(state.distanciaEC * state.cfgDistEC * state.cantidad).toFixed(2)}`],
    ['Instalación compleja', state.instCompleja ? 'Sí' : 'No'],
    ['Porcentaje compleja', `${state.cfgPorcCompleja}%`],
    ['Tubería adicional', state.tuberiaAdicional ? 'Sí' : 'No'],
    ['Metros tubería adicional', state.tuberiaAdicionalMetros],
    ['Costo tubería adic./metro', `${sim} ${state.cfgTuberiaAdic}`],
    ['Garantía extendida', state.garantiaExtendida ? 'Sí' : 'No'],
    ['Costo garantía', `${sim} ${state.cfgGarantia}`],
    ['Mano de obra extra', state.manoObraExtra ? 'Sí' : 'No'],
    ['Horas extra', state.manoObraExtraCant],
    ['Costo mano de obra/hora', `${sim} ${state.cfgManoObra}`],
    ['Incluir IGV', state.incluirIVA ? 'Sí' : 'No'],
    ['Porcentaje IGV', `${state.cfgIVA}%`],
  ];

  // Calcular total
  const cant = state.cantidad;
  const precioBase = (eq.precio_unitario + eq.costo_instalacion_base) * cant;
  const costoAcometida = state.acometida * state.cfgAcometida * cant;
  const costoDistEC = state.distanciaEC * state.cfgDistEC * cant;
  const costoInstCompleja = state.instCompleja ? precioBase * (state.cfgPorcCompleja / 100) : 0;
  const costoTuberiaAdic = state.tuberiaAdicional ? state.tuberiaAdicionalMetros * state.cfgTuberiaAdic * cant : 0;
  const costoGarantia = state.garantiaExtendida ? state.cfgGarantia * cant : 0;
  const costoManoObra = state.manoObraExtra ? state.manoObraExtraCant * state.cfgManoObra : 0;
  const subtotal = precioBase + costoAcometida + costoDistEC + costoInstCompleja + costoTuberiaAdic + costoGarantia + costoManoObra;
  const iva = state.incluirIVA ? subtotal * (state.cfgIVA / 100) : 0;
  const total = subtotal + iva;

  rows.push(['Subtotal general', `${sim} ${subtotal.toFixed(2)}`]);
  rows.push(['IGV', `${sim} ${iva.toFixed(2)}`]);
  rows.push(['TOTAL', `${sim} ${total.toFixed(2)}`]);

  const csvContent = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cotizacion_hvac_${fecha}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exportado correctamente', 'success');
}

// ============================================================
// CARGAR CSV
// ============================================================
function cargarCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const text = ev.target.result;
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      const data = {};
      lines.forEach(line => {
        const commaIdx = line.indexOf(',');
        if (commaIdx === -1) return;
        const key = line.slice(0, commaIdx).replace(/^"|"$/g, '').replace(/""/g, '"');
        const val = line.slice(commaIdx + 1).replace(/^"|"$/g, '').replace(/""/g, '"');
        data[key] = val;
      });

      // Restaurar equipo
      if (data['Equipo']) {
        const eq = DB.equipos.find(e => `${e.marca} ${e.modelo}` === data['Equipo']);
        if (eq) { state.equipoId = eq.id; document.getElementById('selectEquipo').value = eq.id; }
      }

      // Restaurar valores numéricos
      if (data['Cantidad']) { state.cantidad = parseInt(data['Cantidad']) || 1; }
      if (data['Longitud acometida (m)']) { state.acometida = parseFloat(data['Longitud acometida (m)']) || 0; document.getElementById('acometida').value = state.acometida; }
      if (data['Distancia evap-cond (m)']) { state.distanciaEC = parseFloat(data['Distancia evap-cond (m)']) || 0; document.getElementById('distanciaEC').value = state.distanciaEC; }
      if (data['Metros tubería adicional']) { state.tuberiaAdicionalMetros = parseFloat(data['Metros tubería adicional']) || 0; document.getElementById('tuberiaAdicionalMetros').value = state.tuberiaAdicionalMetros; }
      if (data['Horas extra']) { state.manoObraExtraCant = parseFloat(data['Horas extra']) || 0; document.getElementById('manoObraExtraCant').value = state.manoObraExtraCant; }

      // Checkboxes
      setCheckbox('instCompleja', data['Instalación compleja'] === 'Sí');
      setCheckbox('tuberiaAdicional', data['Tubería adicional'] === 'Sí');
      document.getElementById('tuberiaAdicionalMts').style.display = state.tuberiaAdicional ? 'block' : 'none';
      setCheckbox('garantiaExtendida', data['Garantía extendida'] === 'Sí');
      setCheckbox('manoObraExtra', data['Mano de obra extra'] === 'Sí');
      document.getElementById('manoObraExtraHoras').style.display = state.manoObraExtra ? 'block' : 'none';
      setCheckbox('incluirIVA', data['Incluir IGV'] === 'Sí');

      // Config
      if (data['Costo acometida/metro']) {
        const v = parseFloat(data['Costo acometida/metro'].replace(/[^0-9.]/g, ''));
        if (v) { state.cfgAcometida = v; document.getElementById('cfgAcometida').value = v; }
      }
      if (data['Costo dist. evap-cond/metro']) {
        const v = parseFloat(data['Costo dist. evap-cond/metro'].replace(/[^0-9.]/g, ''));
        if (v) { state.cfgDistEC = v; document.getElementById('cfgDistEC').value = v; }
      }
      if (data['Porcentaje compleja']) {
        const v = parseFloat(data['Porcentaje compleja'].replace(/[^0-9.]/g, ''));
        if (v) { state.cfgPorcCompleja = v; document.getElementById('cfgPorcCompleja').value = v; }
      }
      if (data['Costo tubería adic./metro']) {
        const v = parseFloat(data['Costo tubería adic./metro'].replace(/[^0-9.]/g, ''));
        if (v) { state.cfgTuberiaAdic = v; document.getElementById('cfgTuberiaAdic').value = v; }
      }
      if (data['Costo garantía']) {
        const v = parseFloat(data['Costo garantía'].replace(/[^0-9.]/g, ''));
        if (v) { state.cfgGarantia = v; document.getElementById('cfgGarantia').value = v; }
      }
      if (data['Costo mano de obra/hora']) {
        const v = parseFloat(data['Costo mano de obra/hora'].replace(/[^0-9.]/g, ''));
        if (v) { state.cfgManoObra = v; document.getElementById('cfgManoObra').value = v; }
      }
      if (data['Porcentaje IGV']) {
        const v = parseFloat(data['Porcentaje IGV'].replace(/[^0-9.]/g, ''));
        if (v) { state.cfgIVA = v; document.getElementById('cfgIVA').value = v; }
      }

      document.getElementById('cantidadValor').textContent = state.cantidad;
      mostrarInfoEquipo();
      guardarLocalStorage();
      calcular();
      showToast('Cotización cargada correctamente', 'success');
    } catch (err) {
      console.error(err);
      showToast('Error al cargar el CSV: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

          <td style="padding:8px;border:1px solid #ddd;">${cant}</td>
        </tr>
        <tr>
          <td style="padding:8px;border:1px solid #ddd;font-weight:600;">Precio unitario</td>
          <td style="padding:8px;border:1px solid #ddd;">${sim} ${eq.precio_unitario.toFixed(2)}</td>
        </tr>
      </table>

      <h3 style="color:#444;margin-top:16px;">Desglose de Costos</h3>
      <table style="width:100%;border-collapse:collapse;font-size:.9rem;">
        <tr style="background:#1a73e8;color:#fff;">
          <th style="padding:8px;border:1px solid #1557b0;text-align:left;">Concepto</th>
          <th style="padding:8px;border:1px solid #1557b0;text-align:right;">Monto</th>
        </tr>
        <tr><td style="padding:8px;border:1px solid #ddd;">Equipo × ${cant}</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">${sim} ${subtotalEquipo.toFixed(2)}</td></tr>
        <tr><td style="padding:8px;border:1px solid #ddd;">Instalación base × ${cant}</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">${sim} ${subtotalInstalacion.toFixed(2)}</td></tr>
        ${state.acometida > 0 ? `<tr><td style="padding:8px;border:1px solid #ddd;">Acometida (${state.acometida}m × ${sim}${state.cfgAcometida}/m × ${cant})</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">${sim} ${costoAcometida.toFixed(2)}</td></tr>` : ''}
        ${state.distanciaEC > 0 ? `<tr><td style="padding:8px;border:1px solid #ddd;">Dist. evap-cond (${state.distanciaEC}m × ${sim}${state.cfgDistEC}/m × ${cant})</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">${sim} ${costoDistEC.toFixed(2)}</td></tr>` : ''}
        ${state.instCompleja ? `<tr><td style="padding:8px;border:1px solid #ddd;">Instalación compleja (+${state.cfgPorcCompleja}%)</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">${sim} ${costoInstCompleja.toFixed(2)}</td></tr>` : ''}
        ${state.tuberiaAdicional && state.tuberiaAdicionalMetros > 0 ? `<tr><td style="padding:8px;border:1px solid #ddd;">Tubería adicional (${state.tuberiaAdicionalMetros}m × ${sim}${state.cfgTuberiaAdic}/m × ${cant})</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">${sim} ${costoTuberiaAdic.toFixed(2)}</td></tr>` : ''}
        ${state.garantiaExtendida ? `<tr><td style="padding:8px;border:1px solid #ddd;">Garantía extendida × ${cant}</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">${sim} ${costoGarantia.toFixed(2)}</td></tr>` : ''}
        ${state.manoObraExtra && state.manoObraExtraCant > 0 ? `<tr><td style="padding:8px;border:1px solid #ddd;">Mano de obra extra (${state.manoObraExtraCant}h × ${sim}${state.cfgManoObra}/h)</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">${sim} ${costoManoObra.toFixed(2)}</td></tr>` : ''}
        <tr style="background:#f0f6ff;font-weight:700;">
          <td style="padding:8px;border:1px solid #ddd;">Subtotal general</td>
          <td style="padding:8px;border:1px solid #ddd;text-align:right;">${sim} ${subtotalGeneral.toFixed(2)}</td>
        </tr>
        ${state.incluirIVA ? `<tr><td style="padding:8px;border:1px solid #ddd;">IGV (${state.cfgIVA}%)</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">${sim} ${iva.toFixed(2)}</td></tr>` : ''}
        <tr style="background:#1a73e8;color:#fff;font-size:1.1rem;font-weight:700;">
          <td style="padding:10px;border:1px solid #1557b0;">TOTAL</td>
          <td style="padding:10px;border:1px solid #1557b0;text-align:right;">${sim} ${total.toFixed(2)}</td>
        </tr>
      </table>

      <div style="margin-top:24px;padding:12px;background:#f8f9fa;border-radius:6px;font-size:.78rem;color:#888;text-align:center;">
        <p style="margin:0;">Cotización generada automáticamente por el sistema HVAC Cotizador — ZV PERU SAC</p>
        <p style="margin:4px 0 0;">Precios sujetos a confirmación. Válida por 15 días calendario.</p>
      </div>
    </div>
  </div>`;

  const pdfContent = document.getElementById('pdfContent');
  pdfContent.innerHTML = pdfHTML;

  showToast('Generando PDF...', 'success');

  try {
    const canvas = await html2canvas(pdfContent, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = canvas.width;
    const imgHeight = canvas.height;
    const ratio = pdfWidth / imgWidth;
    const totalHeight = imgHeight * ratio;
    let y = 0;

    while (y < totalHeight) {
      pdf.addImage(imgData, 'PNG', 0, -y, pdfWidth, totalHeight);
      y += pdfHeight;
      if (y < totalHeight) pdf.addPage();
    }

    const fechaFile = new Date().toISOString().slice(0,10);
    pdf.save(`cotizacion_hvac_${fechaFile}.pdf`);
    showToast('PDF exportado correctamente', 'success');
  } catch (err) {
    console.error(err);
    showToast('Error al generar PDF: ' + err.message, 'error');
  }
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
