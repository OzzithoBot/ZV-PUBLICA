<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador HVAC — ZV PERU SAC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;--accent:#34a853;--danger:#ea4335;--warning:#fbbc04;--bg:#f5f7fa;--card:#fff;--text:#202124;--text-sec:#5f6368;--border:#dadce0;--radius:12px;--shadow:0 2px 8px rgba(60,64,67,.12);--shadow-lg:0 4px 16px rgba(60,64,67,.18)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-lg)}
.header h1{font-size:1.3rem;font-weight:700}
.header a{color:#fff;text-decoration:none;opacity:.8;font-size:.85rem}
.header a:hover{opacity:1}
.container{max-width:1200px;margin:0 auto;padding:20px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.card h2{font-size:1.05rem;color:var(--primary);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--primary-light);display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--accent);color:#fff}.btn-success:hover{background:#2d9249}
.btn-warning{background:var(--warning);color:#333}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#c5221f}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}.btn-outline:hover{background:var(--primary-light)}
.btn-sm{padding:5px 12px;font-size:.78rem}
.btn-block{width:100%;justify-content:center}
.btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-weight:600;font-size:.8rem;color:var(--text-sec);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:.9rem}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,115,232,.15)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}
/* COTIZACION TABLE */
.cot-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-bottom:16px}
.cot-table th{background:var(--primary);color:#fff;padding:8px 6px;text-align:left;font-weight:600;position:sticky;top:0;font-size:.78rem}
.cot-table th.center{text-align:center}
.cot-table th.right{text-align:right}
.cot-table td{padding:6px;border:1px solid var(--border);vertical-align:middle}
.cot-table td.center{text-align:center}
.cot-table td.right{text-align:right}
.cot-table tr:hover{background:var(--primary-light)}
.cot-table .item-group{background:#e8f0fe;font-weight:700}
.cot-table .item-subgroup{background:#f0f6ff;font-weight:600;font-style:italic}
.cot-table .item-row td:first-child{padding-left:20px}
.cot-table .item-row .desc{font-weight:500}
.cot-table .item-row .detail{font-size:.75rem;color:var(--text-sec)}
.cot-table .total-row{background:var(--primary);color:#fff;font-weight:700;font-size:.95rem}
.cot-table .subtotal-row{background:#e8f0fe;font-weight:700}
.cot-table .igv-row{background:#fff3e0;font-weight:700}
.cot-table input.cant-input{width:60px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;text-align:center;font-size:.82rem}
.cot-table input.price-input{width:70px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;text-align:right;font-size:.82rem}
.cot-table .btn-remove{background:none;border:none;color:var(--danger);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px}
.cot-table .btn-remove:hover{background:#fce8e6}
/* ADD ITEM PANEL */
.add-panel{background:#f8f9fa;border:2px dashed var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.add-panel h3{font-size:.95rem;color:var(--text-sec);margin-bottom:12px}
.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:10px 14px 10px 36px;border:2px solid var(--border);border-radius:8px;font-size:.9rem}
.search-box input:focus{outline:none;border-color:var(--primary)}
.search-box .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-sec)}
.search-results{max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;background:#fff}
.search-result-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s}
.search-result-item:hover{background:var(--primary-light)}
.search-result-item:last-child{border-bottom:none}
.search-result-item .sr-info{flex:1;min-width:0}
.search-result-item .sr-name{font-weight:600;font-size:.85rem}
.search-result-item .sr-detail{font-size:.75rem;color:var(--text-sec)}
.search-result-item .sr-price{font-weight:700;font-size:.85rem;color:var(--primary-dark);white-space:nowrap}
.search-result-item .sr-add{padding:5px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600;white-space:nowrap}
.search-result-item .sr-add:hover{background:#2d9249}
.search-result-item .sr-added{padding:5px 12px;background:var(--border);color:var(--text-sec);border:none;border-radius:6px;font-size:.78rem;font-weight:600;white-space:nowrap;cursor:default}
.search-category{font-size:.72rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;padding:6px 12px;background:#f0f6ff;border-bottom:1px solid var(--border)}
.no-results{text-align:center;padding:20px;color:var(--text-sec);font-size:.85rem}
/* SUMMARY */
.summary-box{background:#f0f6ff;border-radius:8px;padding:16px;margin-top:16px}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.9rem}
.summary-row.total{font-size:1.2rem;font-weight:700;color:var(--primary-dark);border-top:2px solid var(--primary);margin-top:8px;padding-top:12px}
.summary-row.igv{font-weight:600;color:#e65100}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:.9rem;box-shadow:var(--shadow-lg);z-index:9999;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0);pointer-events:auto}
.toast.success{background:var(--accent)}.toast.error{background:var(--danger)}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:95%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px}
.modal h2{color:var(--primary);margin-bottom:16px}
.modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
/* PDF AREA */
.pdf-area{position:absolute;left:-9999px;top:0;width:800px;padding:30px;background:#fff}
/* RESPONSIVE */
@media(max-width:768px){
  .form-grid{grid-template-columns:1fr}
  .header{flex-direction:column;gap:8px;text-align:center}
  .cot-table{font-size:.72rem}
  .cot-table th,.cot-table td{padding:4px 3px}
}
</style>
</head>
<body>

<div class="header">
  <h1>❄️ Cotizador HVAC — ZV PERU SAC</h1>
  <a href="gestion.html">🗄️ Gestionar BD</a>
</div>

<div class="container">
  <div class="card">
    <h2>📋 Cotización del Proyecto</h2>

    <!-- ADD ITEMS PANEL -->
    <div class="add-panel">
      <h3>➕ Agregar ítem a la cotización</h3>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar equipo o material por nombre, marca, modelo, categoría...">
      </div>
      <div class="form-grid" style="margin-bottom:12px">
        <div class="form-group">
          <label>Filtrar por tipo</label>
          <select id="filterType">
            <option value="all">Todos</option>
            <option value="equipo">Equipos</option>
            <option value="material">Materiales</option>
          </select>
        </div>
        <div class="form-group">
          <label>Filtrar por categoría</label>
          <select id="filterCat">
            <option value="all">Todas</option>
          </select>
        </div>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- COTIZACION TABLE -->
    <div style="overflow-x:auto">
      <table class="cot-table" id="cotTable">
        <thead>
          <tr>
            <th style="width:50px">Ítem</th>
            <th>Descripción</th>
            <th class="center" style="width:60px">Und.</th>
            <th class="center" style="width:70px">Cant.</th>
            <th class="right" style="width:80px">P. Unit.</th>
            <th class="right" style="width:80px">Importe</th>
            <th style="width:40px"></th>
          </tr>
        </thead>
        <tbody id="cotBody"></tbody>
        <tfoot id="cotFoot"></tfoot>
      </table>
    </div>

    <!-- SUMMARY -->
    <div class="summary-box" id="summaryBox"></div>

    <!-- ACTIONS -->
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-success" id="btnPDF">📕 Exportar PDF</button>
      <button class="btn btn-warning" id="btnCSV">📊 Exportar CSV</button>
      <div style="flex:1"></div>
      <button class="btn btn-danger btn-sm" id="btnClear">🗑️ Limpiar todo</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- PDF AREA -->
<div class="pdf-area"><div id="pdfContent"></div></div>

<script>
// ============================================================
// DATABASE (shared with gestion.html via localStorage)
// ============================================================
var EQUIPOS_KEY='hvac_equipos',MATERIALES_KEY='hvac_materiales';
var DEFAULT_EQUIPOS=[
  {id:'eq-split-12k',nombre:'Aire acondicionado split 12,000 BTU',tipo:'equipo',categoria:'Aire acondicionado',unidad:'UND',precio:1250,marca:'Midea',modelo:'MSAFB-12HRN1-QC3',btu:12000,eficiencia:'A+',refrigerante:'R-410A'},
  {id:'eq-split-18k',nombre:'Aire acondicionado split 18,000 BTU',tipo:'equipo',categoria:'Aire acondicionado',unidad:'UND',precio:1650,marca:'Midea',modelo:'MSAFB-18HRN1-QC3',btu:18000,eficiencia:'A+',refrigerante:'R-410A'},
  {id:'eq-split-24k',nombre:'Aire acondicionado split 24,000 BTU',tipo:'equipo',categoria:'Aire acondicionado',unidad:'UND',precio:2100,marca:'Midea',modelo:'MSAFB-24HRN1-QC3',btu:24000,eficiencia:'A+',refrigerante:'R-410A'},
  {id:'eq-split-36k',nombre:'Aire acondicionado split 36,000 BTU',tipo:'equipo',categoria:'Aire acondicionado',unidad:'UND',precio:3200,marca:'Midea',modelo:'MSAFB-36HRN1-QC3',btu:36000,eficiencia:'A',refrigerante:'R-410A'},
  {id:'eq-fc-12k',nombre:'Fan Coil 12,000 BTU',tipo:'equipo',categoria:'Aire acondicionado',unidad:'UND',precio:1800,marca:'Midea',modelo:'MCD-12HRN1-Q',btu:12000,eficiencia:'A',refrigerante:'Agua helada'},
  {id:'eq-fc-24k',nombre:'Fan Coil 24,000 BTU',tipo:'equipo',categoria:'Aire acondicionado',unidad:'UND',precio:2800,marca:'Midea',modelo:'MCD-24HRN1-Q',btu:24000,eficiencia:'A',refrigerante:'Agua helada'},
  {id:'eq-vent-ext',nombre:'Ventilador extractor (tipo A)',tipo:'equipo',categoria:'Ventilación',unidad:'UND',precio:5,marca:'Generico',modelo:'V-EXT-A'},
  {id:'eq-vent-imp',nombre:'Ventilador impulsor (tipo B)',tipo:'equipo',categoria:'Ventilación',unidad:'UND',precio:50,marca:'Generico',modelo:'V-IMP-B'},
  {id:'mo-ac',nombre:'Instalación de equipos de aire acondicionado',tipo:'mano_obra',categoria:'Mano de obra',unidad:'UND',precio:1500,detalle:'Incluye: acarreo, montaje, tubería, soldadura, forrado, conexión eléctrica, presurización, vaciado, recarga de gas, pruebas, puesta en marcha, informe final'},
  {id:'mo-vent',nombre:'Instalación de equipos de ventilación mecánica',tipo:'mano_obra',categoria:'Mano de obra',unidad:'UND',precio:1500,detalle:'Incluye: acarreo, montaje, conexión eléctrica, pruebas y puesta en marcha'},
  {id:'gastos-admin',nombre:'Gastos administrativos',tipo:'gasto',categoria:'Gastos',unidad:'UND',precio:300,detalle:'Administrativos, seguros, transporte de materiales y personal técnico'},
  {id:'utilidad',nombre:'Utilidad (10%)',tipo:'utilidad',categoria:'Utilidad',unidad:'%',precio:10,detalle:'Porcentaje de utilidad sobre subtotal'}
];
var DEFAULT_MATERIALES=[
  {id:'mat-gas-r410',nombre:'Gas refrigerante R-410A',tipo:'material',categoria:'Refrigerante',unidad:'KG',precio:20},
  {id:'mat-cinta-foam',nombre:'Cinta Foam',tipo:'material',categoria:'Aislamiento',unidad:'UND',precio:50},
  {id:'mat-cinta-taftan',nombre:'Cinta tafetán',tipo:'material',categoria:'Aislamiento',unidad:'UND',precio:50},
  {id:'mat-tub-cu-12',nombre:'Tubería de cobre 1/2" flexible',tipo:'material',categoria:'Tubería cobre',unidad:'MTS',precio:40},
  {id:'mat-tub-cu-14',nombre:'Tubería de cobre 1/4" flexible',tipo:'material',categoria:'Tubería cobre',unidad:'MTS',precio:50},
  {id:'mat-mang-12',nombre:'Manguera aislante 1/2"',tipo:'material',categoria:'Aislamiento',unidad:'MTS',precio:20},
  {id:'mat-mang-14',nombre:'Manguera aislante 1/4"',tipo:'material',categoria:'Aislamiento',unidad:'MTS',precio:20},
  {id:'mat-nitrogeno',nombre:'Nitrógeno',tipo:'material',categoria:'Gases',unidad:'M³',precio:50},
  {id:'mat-soldadura',nombre:'Soldadura 5%',tipo:'material',categoria:'Soldadura',unidad:'UND',precio:5},
  {id:'mat-bomba-cond',nombre:'Bomba de condensado',tipo:'material',categoria:'Accesorios',unidad:'UND',precio:2},
  {id:'mat-eq-soldar',nombre:'Equipo de soldar oxiacetileno',tipo:'material',categoria:'Herramienta',unidad:'UND',precio:2},
  {id:'mat-cond-25',nombre:'Conductores NH90 - 2.5 mm²',tipo:'material',categoria:'Eléctrico',unidad:'MTS',precio:20},
  {id:'mat-cond-4',nombre:'Conductores NH90 - 4 mm²',tipo:'material',categoria:'Eléctrico',unidad:'MTS',precio:25},
  {id:'mat-conduit-flex',nombre:'Conduit flexible de 3/4"',tipo:'material',categoria:'Eléctrico',unidad:'MTS',precio:50},
  {id:'mat-conduit-rig',nombre:'Tubería conduit rígida 3/4"',tipo:'material',categoria:'Eléctrico',unidad:'MTS',precio:20},
  {id:'mat-cond-10',nombre:'Conductores THW-90 - 10 mm²',tipo:'material',categoria:'Eléctrico',unidad:'MTS',precio:30},
  {id:'mat-tablo-24',nombre:'Tablero 24 polos (adosable)',tipo:'material',categoria:'Eléctrico',unidad:'UND',precio:50},
  {id:'mat-itm-40',nombre:'Interruptor termomagnético 3x40A',tipo:'material',categoria:'Eléctrico',unidad:'UND',precio:20},
  {id:'mat-itm-20',nombre:'Interruptor termomagnético 2x20A',tipo:'material',categoria:'Eléctrico',unidad:'UND',precio:20},
  {id:'mat-idif',nombre:'Interruptor diferencial 2x25A',tipo:'material',categoria:'Eléctrico',unidad:'UND',precio:20},
  {id:'mat-termostato',nombre:'Termostato',tipo:'material',categoria:'Eléctrico',unidad:'UND',precio:37},
  {id:'mat-acces-emt',nombre:'Accesorios para tubería EMT',tipo:'material',categoria:'Eléctrico',unidad:'UND',precio:20},
  {id:'mat-ductos',nombre:'Ductos',tipo:'material',categoria:'Ductos',unidad:'KG',precio:5},
  {id:'mat-difusor',nombre:'Difusor de 4 vías',tipo:'material',categoria:'Ductos',unidad:'KG',precio:5},
  {id:'mat-rejilla',nombre:'Rejilla de retorno y extracción',tipo:'material',categoria:'Ductos',unidad:'KG',precio:5},
  {id:'mat-tub-l2',nombre:'Tubería de cobre tipo "L" 2"',tipo:'material',categoria:'Tubería cobre',unidad:'MTS',precio:50},
  {id:'mat-tub-an2',nombre:'Tubería de acero negro 2"',tipo:'material',categoria:'Tubería acero',unidad:'MTS',precio:50}
];

function loadDB(){
  try{var r=localStorage.getItem(EQUIPOS_KEY);if(r)var equipos=JSON.parse(r);}catch(e){}
  if(!equipos){equipos=JSON.parse(JSON.stringify(DEFAULT_EQUIPOS));localStorage.setItem(EQUIPOS_KEY,JSON.stringify(equipos));}
  try{var r=localStorage.getItem(MATERIALES_KEY);if(r)var materiales=JSON.parse(r);}catch(e){}
  if(!materiales){materiales=JSON.parse(JSON.stringify(DEFAULT_MATERIALES));localStorage.setItem(MATERIALES_KEY,JSON.stringify(materiales));}
  return {equipos:equipos,materiales:materiales};
}
function saveEquipos(a){localStorage.setItem(EQUIPOS_KEY,JSON.stringify(a))}
function saveMateriales(a){localStorage.setItem(MATERIALES_KEY,JSON.stringify(a))}

var db=loadDB();
var allItems=db.equipos.concat(db.materiales);

// ============================================================
// COTIZACION STATE
// ============================================================
// Each line: { uid, tipo:'group'|'subgroup'|'item', codigo, nombre, descripcion, unidad, cantidad, precio, importe, refId }
var lines=[];
var IVA=18;

function uid(){return 'L'+Date.now()+Math.random().toString(36).substr(2,5)}

// ============================================================
// RENDER
// ============================================================
function render(){
  var tbody=document.getElementById('cotBody');
  var tfoot=document.getElementById('cotFoot');
  var summary=document.getElementById('summaryBox');
  var html='';
  var itemNum=0;
  var subtotal=0;

  lines.forEach(function(l,i){
    if(l.tipo==='group'){
      html+='<tr class="item-group"><td colspan="7">'+l.codigo+' '+l.nombre+'</td></tr>';
    } else if(l.tipo==='subgroup'){
      html+='<tr class="item-subgroup"><td colspan="7">'+l.codigo+' '+l.nombre+'</td></tr>';
    } else {
      itemNum++;
      var imp=(l.cantidad||0)*(l.precio||0);
      subtotal+=imp;
      var desc=l.descripcion||l.nombre;
      var detail='';
      if(l.marca) detail+=l.marca+' ';
      if(l.modelo) detail+=l.modelo+' ';
      if(l.btu) detail+=l.btu+' BTU ';
      if(l.eficiencia) detail+='Ef:'+l.eficiencia+' ';
      if(l.refrigerante) detail+=l.refrigerante;
      if(l.detalle) detail=l.detalle;
      html+='<tr class="item-row">'+
        '<td>'+itemNum+'</td>'+
        '<td><div class="desc">'+desc+'</div>'+(detail?'<div class="detail">'+detail+'</div>':'')+'</td>'+
        '<td class="center">'+l.unidad+'</td>'+
        '<td class="center"><input type="number" class="cant-input" min="0" step="0.5" value="'+(l.cantidad||1)+'" data-idx="'+i+'" onchange="updateCant('+i+',this.value)"></td>'+
        '<td class="right"><input type="number" class="price-input" min="0" step="0.01" value="'+(l.precio||0).toFixed(2)+'" data-idx="'+i+'" onchange="updatePrice('+i+',this.value)"></td>'+
        '<td class="right"><strong>'+imp.toFixed(2)+'</strong></td>'+
        '<td><button class="btn-remove" onclick="removeLine('+i+')">✕</button></td>'+
      '</tr>';
    }
  });

  tbody.innerHTML=html||'<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-sec);">Agregue ítems usando el buscador de arriba</td></tr>';

  var ivaAmt=subtotal*(IVA/100);
  var total=subtotal+ivaAmt;
  tfoot.innerHTML='<tr class="subtotal-row"><td colspan="5" class="right">SUBTOTAL</td><td class="right">S/ '+subtotal.toFixed(2)+'</td><td></td></tr>'+
    '<tr class="igv-row"><td colspan="5" class="right">IGV ('+IVA+'%)</td><td class="right">S/ '+ivaAmt.toFixed(2)+'</td><td></td></tr>'+
    '<tr class="total-row"><td colspan="5" class="right">TOTAL</td><td class="right">S/ '+total.toFixed(2)+'</td><td></td></tr>';

  summary.innerHTML='<div class="summary-row"><span>Subtotal</span><span>S/ '+subtotal.toFixed(2)+'</span></div>'+
    '<div class="summary-row igv"><span>IGV ('+IVA+'%)</span><span>S/ '+ivaAmt.toFixed(2)+'</span></div>'+
    '<div class="summary-row total"><span>TOTAL</span><span>S/ '+total.toFixed(2)+'</span></div>';
}

function updateCant(idx,val){
  lines[idx].cantidad=parseFloat(val)||0;
  render();
}
function updatePrice(idx,val){
  lines[idx].precio=parseFloat(val)||0;
  render();
}
function removeLine(idx){
  lines.splice(idx,1);
  render();
}

// ============================================================
// SEARCH & ADD
// ============================================================
var searchTimeout=null;
document.getElementById('searchInput').addEventListener('input',function(){
  clearTimeout(searchTimeout);
  var q=this.value.trim();
  if(q.length<2){document.getElementById('searchResults').innerHTML='';return;}
  searchTimeout=setTimeout(function(){doSearch(q);},200);
});
document.getElementById('searchInput').addEventListener('focus',function(){
  var q=this.value.trim();
  if(q.length>=2) doSearch(q);
});
document.getElementById('filterType').addEventListener('change',function(){
  var q=document.getElementById('searchInput').value.trim();
  if(q.length>=2) doSearch(q);
});
document.getElementById('filterCat').addEventListener('change',function(){
  var q=document.getElementById('searchInput').value.trim();
  if(q.length>=2) doSearch(q);
});

function doSearch(q){
  var typeFilter=document.getElementById('filterType').value;
  var catFilter=document.getElementById('filterCat').value;
  var ql=q.toLowerCase();
  var results=allItems.filter(function(it){
    var matchQ=!q||it.nombre.toLowerCase().includes(ql)||(it.marca||'').toLowerCase().includes(ql)||(it.modelo||'').toLowerCase().includes(ql)||(it.categoria||'').toLowerCase().includes(ql)||it.id.toLowerCase().includes(ql);
    var matchType=typeFilter==='all'||(typeFilter==='equipo'&&it.tipo==='equipo')||(typeFilter==='material'&&it.tipo==='material');
    var matchCat=catFilter==='all'||it.categoria===catFilter;
    return matchQ&&matchType&&matchCat;
  });

  var container=document.getElementById('searchResults');
  if(results.length===0){container.innerHTML='<div class="no-results">No se encontraron resultados</div>';return;}

  // Group by category
  var cats={};
  results.forEach(function(r){if(!cats[r.categoria])cats[r.categoria]=[];cats[r.categoria].push(r);});
  var html='';
  for(var cat in cats){
    html+='<div class="search-category">'+cat+'</div>';
    cats[cat].forEach(function(r){
      var added=lines.some(function(l){return l.refId===r.id});
      var detail='';
      if(r.marca) detail+=r.marca+' ';
      if(r.modelo) detail+=r.modelo+' ';
      if(r.btu) detail+=r.btu+' BTU';
      html+='<div class="search-result-item">'+
        '<div class="sr-info"><div class="sr-name">'+r.nombre+'</div>'+(detail?'<div class="sr-detail">'+detail+'</div>':'')+'</div>'+
        '<div class="sr-price">S/ '+r.precio.toFixed(2)+'</div>'+
        (added?'<button class="sr-added" disabled>✓ Agregado</button>':'<button class="sr-add" onclick="addItem(\''+r.id+'\')">+ Agregar</button>')+
      '</div>';
    });
  }
  container.innerHTML=html;
}

function addItem(id){
  var item=allItems.find(function(i){return i.id===id});
  if(!item) return;
  lines.push({
    uid:uid(),tipo:'item',codigo:'',nombre:'',descripcion:item.nombre,
    unidad:item.unidad,cantidad:1,precio:item.precio,importe:item.precio,refId:item.id,
    marca:item.marca,modelo:item.modelo,btu:item.btu,eficiencia:item.eficiencia,refrigerante:item.refrigerante,detalle:item.detalle
  });
  render();
  showToast(item.nombre+' agregado','success');
  // Refresh search to show "added" state
  var q=document.getElementById('searchInput').value.trim();
  if(q.length>=2) doSearch(q);
}

// Populate category filter
var allCats=[];
allItems.forEach(function(i){if(allCats.indexOf(i.categoria)===-1)allCats.push(i.categoria);});
allCats.sort();
var catSel=document.getElementById('filterCat');
allCats.forEach(function(c){catSel.innerHTML+='<option value="'+c+'">'+c+'</option>';});

// ADD GROUP / SUBGROUP
// ============================================================
function addGroup(){
  var codigo=prompt('Código del grupo (ej: 1, 2, 3):');
  if(!codigo) return;
  var nombre=prompt('Nombre del grupo (ej: SUMINISTRO DE EQUIPOS):');
  if(!nombre) return;
  lines.push({uid:uid(),tipo:'group',codigo:codigo,nombre:nombre});
  render();
}
function addSubgroup(){
  var codigo=prompt('Código del subgrupo (ej: 1.1, 1.2):');
  if(!codigo) return;
  var nombre=prompt('Nombre del subgrupo (ej: Equipos de aire acondicionado):');
  if(!nombre) return;
  lines.push({uid:uid(),tipo:'subgroup',codigo:codigo,nombre:nombre});
  render();
}

// ============================================================
// EXPORT CSV
// ============================================================
document.getElementById('btnCSV').addEventListener('click',function(){
  if(lines.length===0){showToast('Agregue ítems primero','error');return;}
  var rows=[['Ítem','Descripción','Unidad','Cantidad','Precio Unit. (S/)','Importe (S/)']];
  var itemNum=0,subtotal=0;
  lines.forEach(function(l){
    if(l.tipo==='group') rows.push([l.codigo,l.nombre,'','','','']);
    else if(l.tipo==='subgroup') rows.push([l.codigo,l.nombre,'','','','']);
    else{itemNum++;var imp=(l.cantidad||0)*(l.precio||0);subtotal+=imp;rows.push([itemNum,l.descripcion,l.unidad,l.cantidad||0,(l.precio||0).toFixed(2),imp.toFixed(2)]);}
  });
  var ivaAmt=subtotal*(IVA/100),total=subtotal+ivaAmt;
  rows.push(['','','','','SUBTOTAL',subtotal.toFixed(2)]);
  rows.push(['','','','','IGV ('+IVA+'%)',ivaAmt.toFixed(2)]);
  rows.push(['','','','','TOTAL',total.toFixed(2)]);
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cotizacion_hvac.csv';a.click();
  showToast('CSV exportado','success');
});

document.getElementById('btnClear').addEventListener('click',function(){

  lines=[];
  render();

});

// ============================================================
// TOAST
// ============================================================
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'')+' show';
  clearTimeout(t._timeout);
  t._timeout=setTimeout(function(){t.classList.remove('show');},3000);
}
